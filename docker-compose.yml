version: '3.8'

services:
  carryon-carlos-backend:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env
    environment:
      - PORT=8080
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
